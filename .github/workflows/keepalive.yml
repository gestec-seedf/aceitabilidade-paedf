name: Supabase keep-alive

# O free tier do Supabase pausa o projeto após ~1 semana sem atividade.
# Este job bate uma vez por dia na RPC keepalive() para manter o banco ativo,
# evitando que o painel/sincronização fiquem fora do ar quando ninguém usa o app.
# A anon key é pública por design (já vai embutida no app), então pode ficar aqui.

on:
  schedule:
    - cron: '23 9 * * *'   # ~06:23 no horário de Brasília, diariamente
  workflow_dispatch:        # permite disparar manualmente pela aba Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive RPC
        env:
          ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqdG56cm5iYWRveGl4ZHhnd3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjU0MzQsImV4cCI6MjA5NzQ0MTQzNH0.9-aEBPA2uNmG7sp9TxvdxTASzv0780e0yTxPdBVIDQY
        run: |
          curl -sf -X POST \
            "https://rjtnzrnbadoxixdxgwpl.supabase.co/rest/v1/rpc/keepalive" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d '{}'
